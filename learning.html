<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>其他学习进展</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f5;
      --panel: #ffffff;
      --text: #202124;
      --muted: #666b73;
      --line: #d9d9d4;
      --soft: #f0f1ed;
      --accent: #245f73;
      --accent-soft: #dbe9ee;
      --ok: #1f7a4d;
      --warn: #9a6518;
      --bad: #a13c36;
      --shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 16px 22px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 650;
    }

    .muted { color: var(--muted); }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft);
      color: var(--text);
      font-size: 14px;
      text-decoration: none;
      white-space: nowrap;
    }

    .module-tabs {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .module-tabs button {
      flex: none;
      background: #fff;
      color: var(--text);
    }

    .module-tabs button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 650;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 16px;
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 22px 28px;
    }

    .content, .side {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .surface {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      padding: 9px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      font-size: 22px;
    }

    .meter {
      height: 7px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--soft);
    }

    .meter-fill {
      height: 100%;
      width: 0;
      background: var(--accent);
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    input, select, textarea, button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      padding: 7px 8px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    button {
      min-height: 36px;
      padding: 7px 10px;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.danger { color: var(--bad); }

    .entry-form {
      display: grid;
      grid-template-columns: 1.3fr .7fr .7fr;
      gap: 9px;
      align-items: end;
    }

    .entry-form .content-field { grid-column: 1 / -1; }

    .actions, .filters, .cloud-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .actions { margin-top: 10px; }

    .filters {
      display: grid;
      grid-template-columns: 1fr 150px;
      margin-bottom: 10px;
    }

    .notes-list {
      display: grid;
      gap: 9px;
    }

    .note-item {
      display: grid;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 11px;
    }

    .note-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .note-head strong { font-size: 15px; }

    .badges {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: end;
    }

    .badge {
      display: inline-flex;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .status-learning { color: var(--accent); }
    .status-review { color: var(--warn); }
    .status-mastered { color: var(--ok); }

    .note-content {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .note-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .note-item details {
      border-top: 1px solid var(--line);
      padding-top: 7px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      list-style-position: inside;
    }

    .edit-grid, .cloud-grid {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .edit-grid {
      grid-template-columns: 1fr 150px 150px;
    }

    .edit-grid .wide { grid-column: 1 / -1; }

    .cloud-status {
      min-height: 20px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      padding: 18px 8px;
      color: var(--muted);
      text-align: center;
    }

    .view-mode .edit-only { display: none !important; }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .side { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 680px) {
      header { position: static; padding: 14px 12px 10px; }
      main { padding: 12px; }
      .header-row { align-items: center; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .entry-form, .filters, .edit-grid, .side { grid-template-columns: 1fr; }
      .entry-form .content-field, .edit-grid .wide { grid-column: auto; }
      .note-head { display: grid; }
      .badges { justify-content: start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1 id="pageTitle">其他学习进展</h1>
        <div class="muted" id="moduleDescription"></div>
      </div>
      <a class="back-link" id="algorithmLink" href="index.html">算法刷题</a>
    </div>
    <div class="module-tabs" id="moduleTabs" aria-label="学习模块"></div>
  </header>

  <main>
    <div class="content">
      <section class="surface">
        <div class="metrics">
          <div class="metric"><span>记录总数</span><strong id="totalMetric">0</strong></div>
          <div class="metric"><span>学习中</span><strong id="learningMetric">0</strong></div>
          <div class="metric"><span>待复习</span><strong id="reviewMetric">0</strong></div>
          <div class="metric"><span>已掌握</span><strong id="masteredMetric">0</strong></div>
        </div>
        <div class="meter"><div class="meter-fill" id="progressBar"></div></div>
      </section>

      <section class="surface edit-only">
        <h2>记录学习内容</h2>
        <div class="entry-form">
          <label>标题
            <input id="newEntryTitle" placeholder="今天学了什么">
          </label>
          <label>类型
            <select id="newEntryType">
              <option>学习项</option>
              <option selected>学习笔记</option>
              <option>心得</option>
              <option>问题</option>
              <option>面试问答</option>
            </select>
          </label>
          <label>下次复习
            <input id="newEntryReview" type="date">
          </label>
          <label class="content-field">内容
            <textarea id="newEntryContent" placeholder="记录理解、结论、疑问或待验证事项"></textarea>
          </label>
        </div>
        <div class="actions">
          <button class="primary" id="addEntryBtn">添加记录</button>
          <button id="loadStarterBtn">载入建议清单</button>
          <span class="muted" id="entryStatus" role="status" aria-live="polite"></span>
        </div>
      </section>

      <section class="surface">
        <div class="filters">
          <label>搜索
            <input id="searchInput" placeholder="标题或内容">
          </label>
          <label>状态
            <select id="statusFilter">
              <option value="all">全部</option>
              <option value="todo">计划</option>
              <option value="learning">学习中</option>
              <option value="review">需复习</option>
              <option value="mastered">掌握</option>
            </select>
          </label>
        </div>
        <div class="notes-list" id="notesList"></div>
      </section>
    </div>

    <aside class="side">
      <section class="surface">
        <h2>本模块重点</h2>
        <div class="muted" id="moduleFocus"></div>
      </section>

      <section class="surface">
        <h2>云同步</h2>
        <div class="cloud-grid">
          <label>Gist ID
            <input id="cloudGistId" placeholder="与算法页面相同">
          </label>
          <label class="edit-only">GitHub Token
            <input id="cloudToken" type="password" autocomplete="off" placeholder="只保存在当前浏览器">
          </label>
          <div class="cloud-actions">
            <button class="primary edit-only" id="cloudSyncBtn">同步</button>
            <button class="edit-only" id="cloudUploadBtn">上传</button>
            <button id="cloudDownloadBtn">刷新</button>
          </div>
        </div>
        <div class="cloud-status" id="cloudStatus">学习记录使用同一 Gist 中的 learning-notes.json。</div>
      </section>
    </aside>
  </main>

  <script>
    const STORAGE_KEY = "learning-modules-notes-v1";
    const ACTIVE_KEY = "learning-modules-active-v1";
    const SYNC_KEY = "minimal-leetcode-tracker-sync-v1";
    const NOTES_FILE = "learning-notes.json";

    const MODULES = {
      interview: {
        title: "面试笔记",
        description: "沉淀项目讲解、行为面试、系统设计和面试复盘。",
        focus: "重点记录能反复复用的回答，以及每次模拟或正式面试暴露出的表达问题。",
        starters: ["三分钟自我介绍", "TEE 项目深挖", "一次关键技术决策", "一次项目失败与复盘", "为什么转向交易技术", "系统设计回答框架"]
      },
      cpp: {
        title: "C/C++ 高级特性",
        description: "跟踪现代 C++、对象生命周期、并发和性能知识。",
        focus: "每个主题至少保留一个代码示例，并能解释它解决的问题、成本和常见错误。",
        starters: ["RAII 与资源所有权", "对象生命周期", "智能指针", "移动语义", "模板与 concepts", "STL 容器与失效规则", "C++ 内存模型", "atomic 与 memory order"]
      },
      os: {
        title: "计算机操作系统",
        description: "系统学习进程、内存、文件系统、I/O 和并发。",
        focus: "不要只记概念，要能从一个程序的运行过程解释用户态、内核态和硬件之间的关系。",
        starters: ["进程与线程", "系统调用", "虚拟内存与页表", "调度", "同步原语", "文件描述符", "文件系统与 page cache", "I/O 模型与网络"]
      },
      kernel: {
        title: "内核专项技术",
        description: "深入 Linux 内核路径、关键子系统和调试实践。",
        focus: "围绕源码路径、数据结构和一次可运行实验建立知识，不追求一次覆盖所有内核模块。",
        starters: ["系统调用入口", "VFS 路径", "内存分配器", "进程调度器", "中断与软中断", "内核同步", "设备驱动基础", "ftrace、perf 与 eBPF 调试"]
      }
    };

    const STATUS = {
      todo: "计划",
      learning: "学习中",
      review: "需复习",
      mastered: "掌握"
    };

    const el = id => document.getElementById(id);
    const today = () => new Date().toISOString().slice(0, 10);
    const params = new URLSearchParams(location.search);
    const viewMode = params.get("mode") === "view";
    if (viewMode) document.body.classList.add("view-mode");

    let activeModule = MODULES[params.get("module")]
      ? params.get("module")
      : (localStorage.getItem(ACTIVE_KEY) || "interview");
    if (!MODULES[activeModule]) activeModule = "interview";

    let data = loadData();
    let sync = loadSync();

    function emptyData() {
      return {
        app: "learning-progress-notes",
        version: 1,
        updatedAt: "",
        modules: Object.fromEntries(Object.keys(MODULES).map(key => [key, []]))
      };
    }

    function normalizeData(value) {
      const result = emptyData();
      if (value && value.modules && typeof value.modules === "object") {
        Object.keys(MODULES).forEach(key => {
          result.modules[key] = Array.isArray(value.modules[key])
            ? value.modules[key].map(item => ({uid: item.uid || crypto.randomUUID(), ...item}))
            : [];
        });
      }
      result.updatedAt = value?.updatedAt || "";
      return result;
    }

    function loadData() {
      try {
        return normalizeData(JSON.parse(localStorage.getItem(STORAGE_KEY)));
      } catch {
        return emptyData();
      }
    }

    function saveData() {
      data.updatedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadSync() {
      let stored = {};
      try { stored = JSON.parse(localStorage.getItem(SYNC_KEY)) || {}; } catch {}
      return {
        token: stored.token || "",
        gistId: params.get("gist") || stored.gistId || "",
        fileName: stored.fileName || "leetcode-tracker.json"
      };
    }

    function saveSync() {
      sync.token = el("cloudToken").value.trim();
      sync.gistId = el("cloudGistId").value.trim();
      localStorage.setItem(SYNC_KEY, JSON.stringify(sync));
    }

    function moduleItems() {
      return data.modules[activeModule] || [];
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function statusOptions(selected) {
      return Object.entries(STATUS)
        .map(([value, label]) => `<option value="${value}" ${value === selected ? "selected" : ""}>${label}</option>`)
        .join("");
    }

    function renderTabs() {
      el("moduleTabs").innerHTML = Object.entries(MODULES).map(([key, item]) => `
        <button class="${key === activeModule ? "active" : ""}" data-module="${key}">${escapeHtml(item.title)}</button>
      `).join("");
    }

    function renderNote(item) {
      const reviewText = item.reviewDate ? `复习 ${item.reviewDate}` : "未设置复习";
      const updatedText = item.lastDate ? `更新 ${item.lastDate}` : "尚未更新";
      return `
        <article class="note-item" data-uid="${escapeHtml(item.uid)}">
          <div class="note-head">
            <strong>${escapeHtml(item.title || "未命名记录")}</strong>
            <div class="badges">
              <span class="badge">${escapeHtml(item.type || "学习笔记")}</span>
              <span class="badge status-${escapeHtml(item.status || "todo")}">${escapeHtml(STATUS[item.status] || "计划")}</span>
            </div>
          </div>
          ${item.content ? `<div class="note-content">${escapeHtml(item.content)}</div>` : ""}
          <div class="note-meta">${escapeHtml(reviewText)} · ${escapeHtml(updatedText)}</div>
          <div class="actions edit-only">
            <button data-action="master">${item.status === "mastered" ? "继续学习" : "标记掌握"}</button>
            <button class="danger" data-action="delete">删除</button>
          </div>
          <details class="edit-only">
            <summary>编辑</summary>
            <div class="edit-grid">
              <label>标题<input data-field="title" value="${escapeHtml(item.title || "")}"></label>
              <label>类型
                <select data-field="type">
                  ${["学习项","学习笔记","心得","问题","面试问答"].map(value => `<option ${value === item.type ? "selected" : ""}>${value}</option>`).join("")}
                </select>
              </label>
              <label>状态<select data-field="status">${statusOptions(item.status || "todo")}</select></label>
              <label>复习日期<input data-field="reviewDate" type="date" value="${escapeHtml(item.reviewDate || "")}"></label>
              <label class="wide">内容<textarea data-field="content">${escapeHtml(item.content || "")}</textarea></label>
            </div>
          </details>
        </article>
      `;
    }

    function render() {
      const module = MODULES[activeModule];
      const items = moduleItems();
      const mastered = items.filter(item => item.status === "mastered");
      const learning = items.filter(item => item.status === "learning");
      const due = items.filter(item => item.reviewDate && item.reviewDate <= today() && item.status !== "mastered");
      const search = el("searchInput").value.trim().toLowerCase();
      const status = el("statusFilter").value;
      const filtered = items
        .filter(item => status === "all" || item.status === status)
        .filter(item => !search || `${item.title} ${item.content} ${item.type}`.toLowerCase().includes(search))
        .sort((a, b) => String(b.lastDate || "").localeCompare(String(a.lastDate || "")) || String(a.title).localeCompare(String(b.title)));

      el("pageTitle").textContent = module.title;
      document.title = `${module.title} · 学习进展`;
      el("moduleDescription").textContent = module.description;
      el("moduleFocus").textContent = module.focus;
      el("totalMetric").textContent = items.length;
      el("learningMetric").textContent = learning.length;
      el("reviewMetric").textContent = due.length;
      el("masteredMetric").textContent = mastered.length;
      el("progressBar").style.width = items.length ? `${Math.round(mastered.length / items.length * 100)}%` : "0%";
      el("notesList").innerHTML = filtered.length
        ? filtered.map(renderNote).join("")
        : `<div class="empty">${items.length ? "没有符合筛选条件的记录" : "暂无记录，可以载入建议清单或添加第一条笔记"}</div>`;
      renderTabs();
    }

    function addEntry() {
      const title = el("newEntryTitle").value.trim();
      if (!title) {
        el("entryStatus").textContent = "请填写标题。";
        return;
      }
      const entry = {
        uid: crypto.randomUUID(),
        title,
        type: el("newEntryType").value,
        status: "learning",
        content: el("newEntryContent").value.trim(),
        reviewDate: el("newEntryReview").value,
        lastDate: today()
      };
      data.modules[activeModule].unshift(entry);
      saveData();
      ["newEntryTitle", "newEntryContent", "newEntryReview"].forEach(id => el(id).value = "");
      el("entryStatus").textContent = `已添加：${entry.title}`;
      render();
    }

    function loadStarter() {
      const existing = new Set(moduleItems().map(item => item.title));
      let added = 0;
      MODULES[activeModule].starters.forEach(title => {
        if (existing.has(title)) return;
        data.modules[activeModule].push({
          uid: crypto.randomUUID(),
          title,
          type: "学习项",
          status: "todo",
          content: "",
          reviewDate: "",
          lastDate: ""
        });
        added += 1;
      });
      if (added) saveData();
      el("entryStatus").textContent = added ? `已载入 ${added} 个学习项。` : "建议清单已经存在。";
      render();
    }

    function setModule(key) {
      if (!MODULES[key]) return;
      activeModule = key;
      localStorage.setItem(ACTIVE_KEY, key);
      params.set("module", key);
      history.replaceState(null, "", `${location.pathname}?${params.toString()}`);
      render();
    }

    function trackerPayload() {
      return {
        app: "learning-progress-notes",
        version: 1,
        updatedAt: data.updatedAt || new Date().toISOString(),
        modules: data.modules
      };
    }

    function applyPayload(payload) {
      if (!payload || !payload.modules || typeof payload.modules !== "object") {
        throw new Error("云端学习记录格式不正确");
      }
      data = normalizeData(payload);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
    }

    async function githubRequest(path, options = {}) {
      const headers = {
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28",
        ...(options.headers || {})
      };
      if (sync.token) headers.Authorization = `Bearer ${sync.token}`;
      const response = await fetch(`https://api.github.com${path}`, {...options, headers});
      const text = await response.text();
      let responseData = null;
      try { responseData = text ? JSON.parse(text) : null; } catch { responseData = text; }
      if (!response.ok) throw new Error(responseData?.message || response.statusText || `GitHub ${response.status}`);
      return responseData;
    }

    async function fetchCloudPayload() {
      saveSync();
      if (!sync.gistId) throw new Error("请先填写 Gist ID");
      const gist = await githubRequest(`/gists/${sync.gistId}`);
      const file = gist.files?.[NOTES_FILE];
      if (!file) return null;
      const response = await fetch(file.raw_url + `?t=${Date.now()}`);
      if (!response.ok) throw new Error("读取云端学习记录失败");
      return response.json();
    }

    async function uploadCloud() {
      saveSync();
      if (!sync.gistId) throw new Error("请先填写 Gist ID");
      if (!sync.token) throw new Error("上传需要 GitHub Token");
      await githubRequest(`/gists/${sync.gistId}`, {
        method: "PATCH",
        body: JSON.stringify({
          files: {
            [NOTES_FILE]: {content: JSON.stringify(trackerPayload(), null, 2)}
          }
        })
      });
      el("cloudStatus").textContent = `已上传：${new Date().toLocaleString()}`;
    }

    async function downloadCloud() {
      const payload = await fetchCloudPayload();
      if (!payload) {
        el("cloudStatus").textContent = "云端还没有学习记录；电脑端首次同步后会自动创建。";
        return;
      }
      applyPayload(payload);
      el("cloudStatus").textContent = `已刷新：${new Date().toLocaleString()}`;
    }

    async function smartSync() {
      const remote = await fetchCloudPayload();
      if (!remote) {
        await uploadCloud();
        return;
      }
      const remoteTime = Date.parse(remote.updatedAt || 0);
      const localTime = Date.parse(data.updatedAt || 0);
      if (remoteTime > localTime) {
        applyPayload(remote);
        el("cloudStatus").textContent = "云端较新，已下载。";
      } else {
        await uploadCloud();
        el("cloudStatus").textContent = "本地较新，已上传。";
      }
    }

    async function runCloud(action) {
      try {
        el("cloudStatus").textContent = "同步中...";
        await action();
      } catch (error) {
        el("cloudStatus").textContent = `失败：${error.message}`;
      }
    }

    el("moduleTabs").addEventListener("click", event => {
      const button = event.target.closest("button[data-module]");
      if (button) setModule(button.dataset.module);
    });

    el("addEntryBtn").addEventListener("click", addEntry);
    el("newEntryTitle").addEventListener("keydown", event => {
      if (event.key === "Enter") addEntry();
    });
    el("loadStarterBtn").addEventListener("click", loadStarter);
    el("searchInput").addEventListener("input", render);
    el("statusFilter").addEventListener("change", render);

    el("notesList").addEventListener("change", event => {
      const card = event.target.closest("[data-uid]");
      const field = event.target.dataset.field;
      if (!card || !field) return;
      const item = moduleItems().find(row => row.uid === card.dataset.uid);
      if (!item) return;
      item[field] = event.target.value;
      item.lastDate = today();
      saveData();
      render();
    });

    el("notesList").addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      const card = event.target.closest("[data-uid]");
      if (!button || !card) return;
      const items = data.modules[activeModule];
      const item = items.find(row => row.uid === card.dataset.uid);
      if (!item) return;
      if (button.dataset.action === "delete") {
        data.modules[activeModule] = items.filter(row => row.uid !== item.uid);
      } else if (button.dataset.action === "master") {
        item.status = item.status === "mastered" ? "learning" : "mastered";
        item.lastDate = today();
      }
      saveData();
      render();
    });

    el("cloudGistId").value = sync.gistId;
    el("cloudToken").value = sync.token;
    el("cloudGistId").addEventListener("input", saveSync);
    el("cloudToken").addEventListener("input", saveSync);
    el("cloudSyncBtn").addEventListener("click", () => runCloud(smartSync));
    el("cloudUploadBtn").addEventListener("click", () => runCloud(uploadCloud));
    el("cloudDownloadBtn").addEventListener("click", () => runCloud(downloadCloud));

    const algorithmParams = new URLSearchParams();
    if (viewMode) algorithmParams.set("gist", sync.gistId);
    if (viewMode) algorithmParams.set("file", sync.fileName);
    el("algorithmLink").href = viewMode
      ? `mobile.html?${algorithmParams.toString()}`
      : "index.html";
    el("algorithmLink").textContent = viewMode ? "算法看板" : "算法刷题";

    render();
    if (viewMode && sync.gistId) runCloud(downloadCloud);
  </script>
</body>
</html>
