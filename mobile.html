<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学习进展看板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #202124;
      --muted: #666b73;
      --line: #d9d9d4;
      --soft: #f0f1ed;
      --accent: #245f73;
      --accent-soft: #dbe9ee;
      --ok: #1f7a4d;
      --warn: #9a6518;
      --bad: #a13c36;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.45;
    }

    header {
      padding: 18px 16px 10px;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 650;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 650;
    }

    main {
      display: grid;
      gap: 12px;
      padding: 12px;
      max-width: 720px;
      margin: 0 auto;
    }

    .muted { color: var(--muted); }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 24px;
      font-weight: 700;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      display: grid;
      gap: 4px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .item a {
      color: var(--accent);
      font-weight: 650;
      text-decoration: none;
    }

    .item a:hover { text-decoration: underline; }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 2px 7px;
      font-size: 12px;
      white-space: nowrap;
    }

    .status-a { color: var(--ok); }
    .status-b, .status-redo { color: var(--warn); }
    .status-c, .status-weak { color: var(--bad); }

    .meter {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--soft);
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
    }

    label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    input, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    button {
      cursor: pointer;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    details summary {
      cursor: pointer;
      font-weight: 650;
      list-style-position: inside;
    }

    .setup-grid {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .setup-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>学习进展看板</h1>
    <div class="muted" id="syncLine">等待读取云端数据</div>
  </header>

  <main>
    <section class="card">
      <div class="metrics">
        <div class="metric"><span>已做</span><strong id="doneMetric">0/0</strong></div>
        <div class="metric"><span>本周</span><strong id="weekMetric">0/0</strong></div>
        <div class="metric"><span>待复习</span><strong id="dueMetric">0</strong></div>
        <div class="metric"><span>近 30 天 A 率</span><strong id="aRateMetric">0%</strong></div>
      </div>
    </section>

    <section class="card">
      <h2 id="weekTitle">本周进度</h2>
      <div class="meter"><div class="meter-fill" id="weekBar"></div></div>
      <div class="list" id="weekList" style="margin-top:10px"></div>
    </section>

    <section class="card">
      <h2>最近要复习</h2>
      <div class="list" id="dueList"></div>
    </section>

    <section class="card">
      <h2>优先重做</h2>
      <div class="list" id="priorityList"></div>
    </section>

    <section class="card">
      <h2>薄弱专题</h2>
      <div class="list" id="topicList"></div>
    </section>

    <section class="card">
      <details>
        <summary>数据源设置</summary>
        <div class="setup-grid">
          <label>Gist ID
            <input id="gistId" placeholder="例如：abcdef123456">
          </label>
          <label>文件名
            <input id="fileName" value="leetcode-tracker.json">
          </label>
          <label>GitHub Token，可选
            <input id="token" type="password" autocomplete="off" placeholder="公开/隐藏 Gist 不需要">
          </label>
          <div class="setup-actions">
            <button id="saveConfigBtn">保存</button>
            <button id="refreshBtn">刷新</button>
          </div>
          <div class="muted">手机端只读，不会修改云端数据。</div>
        </div>
      </details>
    </section>
  </main>

  <script>
    const CONFIG_KEY = "leetcode-mobile-viewer-config-v1";
    const STATUS_LABELS = {
      todo: "未开始",
      a: "A 独立",
      b: "B 提示",
      c: "C 题解",
      redo: "重做",
      mastered: "掌握",
      weak: "薄弱"
    };

    const $ = id => document.getElementById(id);
    const today = () => new Date().toISOString().slice(0, 10);
    const params = new URLSearchParams(location.search);

    function loadConfig() {
      let stored = {};
      try { stored = JSON.parse(localStorage.getItem(CONFIG_KEY)) || {}; } catch {}
      return {
        gistId: params.get("gist") || stored.gistId || "",
        fileName: params.get("file") || stored.fileName || "leetcode-tracker.json",
        token: stored.token || ""
      };
    }

    function saveConfig() {
      const config = {
        gistId: $("gistId").value.trim(),
        fileName: $("fileName").value.trim() || "leetcode-tracker.json",
        token: $("token").value.trim()
      };
      localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
      return config;
    }

    function isDone(task) {
      return ["a", "b", "c", "mastered"].includes(task.status);
    }

    function statusLabel(status) {
      return STATUS_LABELS[status] || status || "未开始";
    }

    function taskUrl(task) {
      return task.slug
        ? `https://leetcode.com/problems/${task.slug}/`
        : `https://leetcode.com/problemset/?search=${encodeURIComponent(task.id)}`;
    }

    function renderTask(task, extra = "") {
      return `
        <div class="item">
          <div class="item-row">
            <a href="${taskUrl(task)}" target="_blank" rel="noopener">#${escapeHtml(task.id)} ${escapeHtml(task.title || "")}</a>
            <span class="tag status-${escapeHtml(task.status || "todo")}">${escapeHtml(statusLabel(task.status))}</span>
          </div>
          <div class="muted">${escapeHtml(task.topic || "未分类")} · ${escapeHtml(task.minutes || "-")} 分钟${extra}</div>
          ${task.notes ? `<div class="muted">${escapeHtml(task.notes)}</div>` : ""}
        </div>
      `;
    }

    function renderEmpty(text) {
      return `<div class="muted">${text}</div>`;
    }

    function currentWeek(tasks) {
      const unfinished = tasks.find(task => !isDone(task));
      if (unfinished) return Number(unfinished.week || 1);
      return Math.max(1, ...tasks.map(task => Number(task.week || 1)));
    }

    function analyze(tasks) {
      const total = tasks.length;
      const done = tasks.filter(isDone);
      const due = tasks.filter(task => task.reviewDate && task.reviewDate <= today() && task.status !== "mastered");
      const week = currentWeek(tasks);
      const weekTasks = tasks.filter(task => Number(task.week) === week);
      const weekDone = weekTasks.filter(isDone);

      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 30);
      const recent = done.filter(task => task.lastDate && new Date(task.lastDate) >= cutoff);
      const recentA = recent.filter(task => task.status === "a" || task.status === "mastered");
      const aRate = recent.length ? Math.round(recentA.length / recent.length * 100) : 0;

      const priority = tasks
        .map(task => ({
          ...task,
          priority: (task.reviewDate && task.reviewDate <= today() ? 5 : 0)
            + (task.status === "weak" ? 5 : 0)
            + (task.status === "c" ? 4 : 0)
            + (task.status === "redo" ? 4 : 0)
            + (task.status === "b" ? 3 : 0)
            + (Number(task.minutes) > 50 ? 2 : 0)
        }))
        .filter(task => task.priority > 0 && task.status !== "mastered")
        .sort((a, b) => b.priority - a.priority || String(a.reviewDate || "9999").localeCompare(String(b.reviewDate || "9999")))
        .slice(0, 8);

      const topicMap = new Map();
      tasks.forEach(task => {
        const topic = task.topic || "未分类";
        const item = topicMap.get(topic) || {topic, weak: 0, due: 0, minutes: 0, timed: 0};
        if (["b", "c", "weak", "redo"].includes(task.status)) item.weak += 1;
        if (task.reviewDate && task.reviewDate <= today() && task.status !== "mastered") item.due += 1;
        if (Number(task.minutes) > 0) {
          item.minutes += Number(task.minutes);
          item.timed += 1;
        }
        topicMap.set(topic, item);
      });
      const weakTopics = [...topicMap.values()]
        .map(item => ({
          ...item,
          avg: item.timed ? Math.round(item.minutes / item.timed) : 0,
          score: item.weak * 3 + item.due * 2 + Math.max(0, item.avg - 45) / 10
        }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 6);

      return {total, done, due, week, weekTasks, weekDone, aRate, priority, weakTopics};
    }

    function render(payload) {
      const tasks = Array.isArray(payload.tasks) ? payload.tasks : [];
      const data = analyze(tasks);
      $("doneMetric").textContent = `${data.done.length}/${data.total}`;
      $("weekMetric").textContent = `${data.weekDone.length}/${data.weekTasks.length}`;
      $("dueMetric").textContent = data.due.length;
      $("aRateMetric").textContent = `${data.aRate}%`;
      $("weekTitle").textContent = `第 ${data.week} 周进度`;
      $("weekBar").style.width = data.weekTasks.length ? `${Math.round(data.weekDone.length / data.weekTasks.length * 100)}%` : "0%";

      const unfinished = data.weekTasks.filter(task => !isDone(task)).slice(0, 8);
      const completed = data.weekTasks.filter(isDone).slice(-5).reverse();
      $("weekList").innerHTML = [
        unfinished.length ? `<div class="muted">未完成</div>${unfinished.map(task => renderTask(task)).join("")}` : "",
        completed.length ? `<div class="muted">最近完成</div>${completed.map(task => renderTask(task)).join("")}` : ""
      ].join("") || renderEmpty("暂无本周题目");

      $("dueList").innerHTML = data.due
        .sort((a, b) => String(a.reviewDate || "9999").localeCompare(String(b.reviewDate || "9999")))
        .slice(0, 10)
        .map(task => renderTask(task, ` · 复习 ${escapeHtml(task.reviewDate || "")}`))
        .join("") || renderEmpty("暂无到期复习题");

      $("priorityList").innerHTML = data.priority
        .map(task => renderTask(task, ` · 复习 ${escapeHtml(task.reviewDate || "未设")}`))
        .join("") || renderEmpty("暂无优先重做题");

      $("topicList").innerHTML = data.weakTopics
        .map(item => `
          <div class="item">
            <div class="item-row">
              <strong>${escapeHtml(item.topic)}</strong>
              <span class="tag">平均 ${item.avg || "-"} 分钟</span>
            </div>
            <div class="muted">B/C/薄弱 ${item.weak} 题 · 到期 ${item.due} 题</div>
          </div>
        `)
        .join("") || renderEmpty("暂无薄弱专题");

      const updated = payload.updatedAt ? new Date(payload.updatedAt).toLocaleString() : "未知";
      $("syncLine").textContent = `云端更新时间：${updated}`;
    }

    async function fetchPayload(config) {
      if (!config.gistId) throw new Error("请先填写 Gist ID");
      const headers = {
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28"
      };
      if (config.token) headers.Authorization = `Bearer ${config.token}`;
      const gistRes = await fetch(`https://api.github.com/gists/${config.gistId}`, {headers});
      if (!gistRes.ok) throw new Error(`读取 Gist 失败：${gistRes.status}`);
      const gist = await gistRes.json();
      const file = gist.files[config.fileName] || Object.values(gist.files)[0];
      if (!file) throw new Error("Gist 中没有数据文件");
      const dataRes = await fetch(file.raw_url + `?t=${Date.now()}`);
      if (!dataRes.ok) throw new Error(`读取数据失败：${dataRes.status}`);
      return dataRes.json();
    }

    async function refresh() {
      const config = saveConfig();
      $("syncLine").textContent = "正在读取云端数据...";
      try {
        const payload = await fetchPayload(config);
        render(payload);
      } catch (error) {
        $("syncLine").textContent = error.message;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    const config = loadConfig();
    $("gistId").value = config.gistId;
    $("fileName").value = config.fileName;
    $("token").value = config.token;
    $("saveConfigBtn").addEventListener("click", () => {
      saveConfig();
      $("syncLine").textContent = "数据源设置已保存";
    });
    $("refreshBtn").addEventListener("click", refresh);
    if (config.gistId) refresh();
  </script>
</body>
</html>
